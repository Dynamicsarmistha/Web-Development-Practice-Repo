<!Doctype html>
<html>
    <head>
        <title>OUD LIST</title>
    </head>
    <body>
        <h1>Tis is an <strong> order list</strong></h1>
        <ol>
            <li>step one</li>
            <li>step two</li>
            <li>step three</li>
        </ol>
        <h2>This is an <strong>Unordered list</strong></h2>
        <ul>
        <li>apples</li>
        <li>orange</li>
        <li>pears</li>
        </ul>
        <h3>This is a <strong>definition list:</strong></h3>
        <dl>
            <dt>cat</dt>
            <dt>cute four-legged animal.</dt>
            <dt>internet</dt>
            <dt>oniline community optimized for cat photos.</dt>
        <dl>
    </body>
</html>
